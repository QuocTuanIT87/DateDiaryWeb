<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>DateDiary - Kết nối tài khoản Google</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #f8fbfe;
      color: #1e293b;
      text-align: center;
    }
    .spinner {
      border: 4px solid rgba(85, 150, 224, 0.1);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border-left-color: #5596e0;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h3 {
      font-weight: 500;
      margin-bottom: 8px;
    }
    p {
      color: #64748b;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h3>Đang xử lý kết nối Google...</h3>
  <p>Cửa sổ này sẽ tự động đóng lại sau khi hoàn tất.</p>

  <script>
    // Grab key parameters from OAuth hash redirect
    const hash = window.location.hash;
    const params = new URLSearchParams(hash.substring(1));
    const token = params.get("access_token");
    const expiresIn = params.get("expires_in");
    const error = params.get("error");

    if (window.opener) {
      if (token) {
        window.opener.postMessage(
          { type: "GOOGLE_OAUTH_TOKEN", token: token, expiresIn: expiresIn },
          window.location.origin
        );
      } else {
        window.opener.postMessage(
          { type: "GOOGLE_OAUTH_ERROR", error: error || "Unknown OAuth error" },
          window.location.origin
        );
      }
    }
    
    // Close the popup window after a short delay
    setTimeout(() => {
      window.close();
    }, 800);
  </script>
</body>
</html>
